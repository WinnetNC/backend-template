name: Backend CI

on:
  push:
    branches:
      - main
      - development
      - "feature/**"
  pull_request:
    branches:
      - main
      - development

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # 🔹 Lint
      - name: Lint
        run: npm run lint

      # 🔹 Build
      - name: Build
        run: npm run build

      # 🔹 Run tests with coverage: Unit & API Tests (Jest + Supertest)
      - name: Run tests
        run: npm run test:ci
